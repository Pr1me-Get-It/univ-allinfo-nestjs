version: '3.8'

services:
  api:
    build:
      context: .
      target: builder # 로컬에서는 빌더 스테이지를 타게 하여 개발 편의성 확보
    container_name: univallinfo_api
    ports:
      - '${PORT:-3000}:3000'
    volumes:
      # 로컬 코드를 컨테이너에 동기화 (Hot Reload용)
      - .:/usr/src/app
      - /usr/src/app/node_modules
    command: npm run start:dev
    env_file:
      - .env
    environment:
      # Hot-Reload 강제 활성화
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
      - TSC_WATCHFILE=DynamicPriorityPolling
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  db:
    image: mysql:8.0
    container_name: univallinfo_db
    ports:
      - '${DB_PORT:-3306}:3306'
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_PASSWORD}
      - MYSQL_DATABASE=${DB_NAME}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
      timeout: 20s
      retries: 10

  redis:
    image: redis:alpine
    container_name: univallinfo_redis
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redis_data:/data

volumes:
  mysql_data:
  redis_data:
