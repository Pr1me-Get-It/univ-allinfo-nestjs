name: Auto API Documentation

on:
  pull_request:
    types: [closed]
    branches:
      - main
      - master
      - develop

jobs:
  generate-api-docs:
    # PR이 실제로 merge된 경우에만 실행
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2  # 변경사항 비교를 위해 이전 커밋도 필요

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Get changed API files
        id: changed-files
        run: |
          # 변경된 파일 목록 추출 (controller, router, route 파일만 필터링)
          CHANGED=$(git diff --name-only HEAD~1 HEAD | grep -E '\.(controller|router|route)\.(ts|js)$' || true)

          if [ -z "$CHANGED" ]; then
            echo "No API files changed."
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "Changed API files:"
            echo "$CHANGED"
            # 줄바꿈을 쉼표로 변환하여 저장
            CHANGED_COMMA=$(echo "$CHANGED" | tr '\n' ',' | sed 's/,$//')
            echo "files=$CHANGED_COMMA" >> $GITHUB_OUTPUT
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Generate and upload API docs to Notion
        if: steps.changed-files.outputs.has_changes == 'true'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          NOTION_API_TOKEN: ${{ secrets.NOTION_API_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          CHANGED_FILES: ${{ steps.changed-files.outputs.files }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_MERGED_AT: ${{ github.event.pull_request.merged_at }}
          REPO_ROOT: ${{ github.workspace }}
        run: node .github/scripts/generate-api-docs.js

      - name: Skip - No API changes detected
        if: steps.changed-files.outputs.has_changes == 'false'
        run: echo "✅ No controller/router changes detected. Skipping API doc generation."
